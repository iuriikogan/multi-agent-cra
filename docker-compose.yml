services:
  # --- Unified Server (API + Frontend) ---
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: server
    ports:
      - "8080:8080"
    environment:
      - PROJECT_ID=$PROJECT_ID
      - REGION=$REGION
      - LOG_LEVEL=DEBUG
      - SERVER_PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUBSUB_EMULATOR_HOST="http://localhost:8085/"
      - PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests
      - PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub
      - DATABASE_TYPE=SQLITE_MEM
    depends_on:
      pubsub:
        condition: service_healthy
      setup-pubsub:
        condition: service_completed_successfully

  # --- Worker Service ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: worker
    # In local dev, we run the worker binary directly (or via container entrypoint)
    environment:
      - PROJECT_ID=${PROJECT_ID}
      - REGION=${REGION}
      - LOG_LEVEL=DEBUG
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUBSUB_EMULATOR_HOST="http://localhost:8085/"
      - PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests
      - PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub
      - DATABASE_TYPE=SQLITE_MEM
      - PORT=8080 # For health checks
    depends_on:
      pubsub:
        condition: service_healthy
      setup-pubsub:
        condition: service_completed_successfully

  # --- Infrastructure Emulators ---

  pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:560.0.0-emulators
    command: gcloud beta emulators pubsub start --project=$PROJECT_ID --host-port=0.0.0.0:8085 --quiet
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/"]
      interval: 5s
      timeout: 10s
      retries: 5

  setup-pubsub:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:560.0.0-emulators
    environment:
      - PUBSUB_EMULATOR_HOST="http://localhost:8085/"
    command: >
      bash -c "echo 'Waiting for Pub/Sub emulator...' &&
      until curl -s "$PUBSUB_EMULATOR_HOST"; do sleep 2; done &&
      echo 'Creating topic and subscription...' &&
      curl -s -X PUT http://"$PUBSUB_EMULATOR_HOST"/v1/projects/test-project/topics/scan-requests &&
      curl -s -X PUT http://"$PUBSUB_EMULATOR_HOST"/v1/projects/test-project/subscriptions/scan-requests-sub \
        -H 'Content-Type: application/json' \
        -d '{"topic": "projects/${PROJECT_ID}/topics/scan-requests"}' &&
      echo 'Pub/Sub resources created.'"
    depends_on:
      pubsub:
        condition: service_healthy
