version: '3.8'

services:
  # --- Unified Server (API + Frontend) ---
  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: server
    ports:
      - "8080:8080"
    environment:
      - PROJECT_ID=test-project
      - REGION=us-central1
      - LOG_LEVEL=DEBUG
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUBSUB_EMULATOR_HOST=pubsub:8085
      - PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests
      - PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub
      - FIRESTORE_EMULATOR_HOST=firestore:8080
    depends_on:
      pubsub:
        condition: service_healthy
      firestore:
        condition: service_started
      setup-pubsub:
        condition: service_completed_successfully

  # --- Worker Service ---
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: worker
    # In local dev, we run the worker binary directly (or via container entrypoint)
    environment:
      - PROJECT_ID=test-project
      - REGION=us-central1
      - LOG_LEVEL=DEBUG
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUBSUB_EMULATOR_HOST=pubsub:8085
      - PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests
      - PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub
      - FIRESTORE_EMULATOR_HOST=firestore:8080
      - PORT=8080 # For health checks
    depends_on:
      pubsub:
        condition: service_healthy
      firestore:
        condition: service_started
      setup-pubsub:
        condition: service_completed_successfully

  # --- Infrastructure Emulators ---

  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --project=test-project --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/"]
      interval: 5s
      timeout: 10s
      retries: 5

  setup-pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub:8085
    command: >
      bash -c "echo 'Waiting for Pub/Sub emulator...' &&
      until curl -s http://pubsub:8085/; do sleep 2; done &&
      echo 'Creating topic and subscription...' &&
      curl -s -X PUT http://pubsub:8085/v1/projects/test-project/topics/scan-requests &&
      curl -s -X PUT http://pubsub:8085/v1/projects/test-project/subscriptions/scan-requests-sub \
        -H 'Content-Type: application/json' \
        -d '{"topic": "projects/test-project/topics/scan-requests"}' &&
      echo 'Pub/Sub resources created.'"
    depends_on:
      pubsub:
        condition: service_healthy

  firestore:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators firestore start --project=test-project --host-port=0.0.0.0:8080
    ports:
      - "8081:8080" # Map to 8081 locally to avoid conflict with server on 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 10s
      retries: 5
