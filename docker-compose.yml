version: '3.8'

services:
  # --- Backend Services ---

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: server
    # Override command for development to use go run for hot reloading (optional setup)
    # or just run the built binary. For "dev env", running from source is often preferred.
    # Here we use a trick to keep the container running and install air for hot reload if desired,
    # or just run go run.
    image: golang:1.25
    working_dir: /app
    volumes:
      - .:/app
    command: go run ./cmd/server/main.go
    environment:
      - PROJECT_ID=test-project
      - REGION=us-central1
      - LOG_LEVEL=DEBUG
      - PORT=8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUBSUB_EMULATOR_HOST=pubsub:8085
      - PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests
      - PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub
      - FIRESTORE_EMULATOR_HOST=firestore:8080
    ports:
      - "8080:8080"
    depends_on:
      pubsub:
        condition: service_healthy
      firestore:
        condition: service_started
      setup-pubsub:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TARGET: worker
    image: golang:1.25
    working_dir: /app
    volumes:
      - .:/app
    command: go run ./cmd/worker/main.go
    environment:
      - PROJECT_ID=test-project
      - REGION=us-central1
      - LOG_LEVEL=DEBUG
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PUBSUB_EMULATOR_HOST=pubsub:8085
      - PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests
      - PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub
      - FIRESTORE_EMULATOR_HOST=firestore:8080
    depends_on:
      pubsub:
        condition: service_healthy
      firestore:
        condition: service_started
      setup-pubsub:
        condition: service_completed_successfully

  # --- Frontend Service ---

  web:
    image: node:20-alpine
    working_dir: /app
    # Development command
    command: sh -c "npm install && npm run dev"
    volumes:
      - ./web:/app
      # Anonymous volume to keep node_modules in container
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - server

  # --- Infrastructure Emulators ---

  pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --project=test-project --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/"]
      interval: 5s
      timeout: 10s
      retries: 5

  setup-pubsub:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    environment:
      - PUBSUB_EMULATOR_HOST=pubsub:8085
    command: >
      bash -c "echo 'Waiting for Pub/Sub emulator...' &&
      until curl -s http://pubsub:8085/; do sleep 2; done &&
      echo 'Creating topic and subscription...' &&
      curl -s -X PUT http://pubsub:8085/v1/projects/test-project/topics/scan-requests &&
      curl -s -X PUT http://pubsub:8085/v1/projects/test-project/subscriptions/scan-requests-sub \
        -H 'Content-Type: application/json' \
        -d '{"topic": "projects/test-project/topics/scan-requests"}' &&
      echo 'Pub/Sub resources created.'"
    depends_on:
      pubsub:
        condition: service_healthy

  firestore:
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators firestore start --project=test-project --host-port=0.0.0.0:8080
    ports:
      - "8081:8080" # Map to 8081 locally to avoid conflict with server on 8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 5s
      timeout: 10s
      retries: 5
