# This workflow provisions GCP infrastructure via build.sh and builds/deploys
# container images to Cloud Run via cloudbuild.yaml on the "main" branch.
#
# Prerequisites:
# 1. Enable APIs: Artifact Registry, Cloud Run, Cloud Build, IAM Credentials.
# 2. Configure Workload Identity Federation for GitHub Actions:
#    https://github.com/google-github-actions/auth#preferred-direct-workload-identity-federation
# 3. Set GitHub secrets: GCP_PROJECT_ID, WORKLOAD_IDENTITY_PROVIDER, GEMINI_API_KEY
# 4. Grant the Workload Identity SA: roles/cloudbuild.builds.editor, roles/iam.serviceAccountUser

name: 'Build and Deploy to Cloud Run'

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}

jobs:
  deploy:
    runs-on: 'ubuntu-latest'

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: 'Checkout'
        uses: 'actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332' # actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@f112390a2df9932162083945e46d439060d66ec2' # google-github-actions/auth@v2
        with:
          workload_identity_provider: '${{ env.WORKLOAD_IDENTITY_PROVIDER }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a' # google-github-actions/setup-gcloud@v2

      # Provision GCP infrastructure (APIs, VPC, IAM, SQL, Pub/Sub, LB, etc.)
      - name: 'Provision Infrastructure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          chmod +x ./build.sh
          ./build.sh

      # Build Docker images and deploy to Cloud Run via cloudbuild.yaml
      - name: 'Build and Deploy via Cloud Build'
        run: |
          DB_IP=$(gcloud sql instances describe compliance-mysql-instance \
            --format='value(ipAddresses[0].ipAddress)' \
            --project=${{ env.PROJECT_ID }})

          gcloud beta builds submit \
            --project=${{ env.PROJECT_ID }} \
            --config=cloudbuild.yaml \
            --service-account="projects/${{ env.PROJECT_ID }}/serviceAccounts/compliance-build-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --substitutions="_TAG=${{ github.sha }},_DB_IP=${DB_IP}"

      - name: 'Show Cloud Run URLs'
        run: |
          echo "Server URL:"
          gcloud run services describe compliance-server \
            --region=europe-west1 --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)'
          echo "Worker URL:"
          gcloud run services describe compliance-worker \
            --region=europe-west1 --project=${{ env.PROJECT_ID }} \
            --format='value(status.url)'