steps:
  # --- DOCKER BUILDS (Using Kaniko for optimized caching) ---
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'Build Server'
    args:
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
      - '--cache=true'
      - '--cache-ttl=24h'
      - '--target=server'
      - '--context=dir:///workspace'
    waitFor: ['-']

  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'Build Worker'
    args:
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
      - '--cache=true'
      - '--cache-ttl=24h'
      - '--target=worker'
      - '--context=dir:///workspace'
    waitFor: ['-']

  # --- DEPLOYMENT ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Server'
    waitFor: ['Build Server']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'compliance-server'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--ingress'
      - 'all'
      - '--service-account'
      - 'compliance-server-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--vpc-connector'
      - 'compliance-connector'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},ROLE=server,DATABASE_TYPE=CLOUD_SQL'
      - '--set-env-vars'
      - 'DATABASE_URL=compliance_user:change_me_in_production@tcp(${_DB_IP}:3306)/compliance_db?parseTime=true'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub,PUBSUB_TOPIC_AGGREGATOR=aggregator-topic,PUBSUB_TOPIC_MODELER=modeler-topic,PUBSUB_TOPIC_VALIDATOR=validator-topic,PUBSUB_TOPIC_REVIEWER=reviewer-topic,PUBSUB_TOPIC_TAGGER=tagger-topic,PUBSUB_TOPIC_REPORTER=reporter-topic,PUBSUB_TOPIC_MONITORING=monitoring-topic'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--no-allow-unauthenticated'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Worker'
    waitFor: ['Build Worker']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'compliance-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--ingress'
      - 'internal'
      - '--service-account'
      - 'compliance-worker-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--vpc-connector'
      - 'compliance-connector'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},ROLE=worker,DATABASE_TYPE=CLOUD_SQL'
      - '--set-env-vars'
      - 'DATABASE_URL=compliance_user:change_me_in_production@tcp(${_DB_IP}:3306)/compliance_db?parseTime=true'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub,PUBSUB_TOPIC_AGGREGATOR=aggregator-topic,PUBSUB_TOPIC_MODELER=modeler-topic,PUBSUB_TOPIC_VALIDATOR=validator-topic,PUBSUB_TOPIC_REVIEWER=reviewer-topic,PUBSUB_TOPIC_TAGGER=tagger-topic,PUBSUB_TOPIC_REPORTER=reporter-topic,PUBSUB_TOPIC_MONITORING=monitoring-topic'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: europe-west1
  _REPO_NAME: multi-agent-compliance
  _TAG: latest
  _DB_IP: 10.0.0.3


options:

  logging: CLOUD_LOGGING_ONLY
