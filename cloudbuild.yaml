steps:
  # --- PREPARATION ---
  # Ensure cache bucket exists (swallow error if already exists)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Prepare Cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil mb -l ${_REGION} gs://${PROJECT_ID}-build-cache || true
    waitFor: ['-']

  # --- FRONTEND BUILD ---
  # Fetch node_modules from cache
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Fetch Frontend Cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gsutil cp gs://${PROJECT_ID}-build-cache/multi-agent-compliance/web-node-modules.tar.gz . || echo "No cache found"
        if [ -f web-node-modules.tar.gz ]; then tar -xzf web-node-modules.tar.gz; fi
    waitFor: ['Prepare Cache']

  - name: 'node:22-alpine'
    id: 'Install Frontend'
    entrypoint: 'npm'
    args: ['install']
    dir: 'web'
    waitFor: ['Fetch Frontend Cache']

  - name: 'node:22-alpine'
    id: 'Build Frontend'

    entrypoint: 'npm'
    args: ['run', 'build']
    dir: 'web'
    waitFor: ['Install Frontend']

  # Save node_modules to cache in parallel with the rest of the build
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Save Frontend Cache'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        tar -czf web-node-modules.tar.gz web/node_modules
        gsutil cp web-node-modules.tar.gz gs://${PROJECT_ID}-build-cache/multi-agent-compliance/web-node-modules.tar.gz
    waitFor: ['Install Frontend']

  # --- DOCKER BUILDS (Using Kaniko for optimized caching) ---
  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'Build Server'
    args:
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
      - '--cache=true'
      - '--cache-ttl=24h'
      - '--build-arg=TARGET=server'
      - '--context=dir:///workspace'
    waitFor: ['Build Frontend']

  - name: 'gcr.io/kaniko-project/executor:latest'
    id: 'Build Worker'
    args:
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
      - '--cache=true'
      - '--cache-ttl=24h'
      - '--build-arg=TARGET=worker'
      - '--context=dir:///workspace'
    waitFor: ['Build Frontend']

  # --- DEPLOYMENT ---
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Server'
    waitFor: ['Build Server']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'compliance-server'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--ingress'
      - 'all'
      - '--service-account'
      - 'compliance-server-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--vpc-connector'
      - 'compliance-connector'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},ROLE=server,DATABASE_TYPE=CLOUD_SQL'
      - '--set-env-vars'
      - 'DATABASE_URL=compliance_user:change_me_in_production@tcp(${_DB_IP}:3306)/compliance_db?parseTime=true'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--no-allow-unauthenticated'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Worker'
    waitFor: ['Build Worker']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'compliance-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--ingress'
      - 'internal'
      - '--service-account'
      - 'compliance-worker-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--vpc-connector'
      - 'compliance-connector'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},ROLE=worker,DATABASE_TYPE=CLOUD_SQL'
      - '--set-env-vars'
      - 'DATABASE_URL=compliance_user:change_me_in_production@tcp(${_DB_IP}:3306)/compliance_db?parseTime=true'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: europe-west1
  _REPO_NAME: multi-agent-compliance
  _TAG: latest
  _DB_IP: 10.0.0.3


options:

  logging: CLOUD_LOGGING_ONLY
