steps:
  # --- FRONTEND BUILD & DEPLOY ---
  # 1. Build Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Frontend'
    args: ['build', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${_TAG}', '-f', 'web/Dockerfile', 'web/']
  
  # 2. Push Frontend Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Frontend'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${_TAG}']


  # --- SERVER BUILD & DEPLOY ---
  # 4. Build Server Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Server'
    args: ['build', '--build-arg', 'TARGET=server', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}', '.']
  
  # 5. Push Server Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Server'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}']

  # 6. Deploy Server Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Server'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cra-server'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO,GCS_BUCKET_NAME=cra-data-${PROJECT_ID},ROLE=server'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'

  # 7. Deploy Frontend Service (requires Server URL)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Frontend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        SERVER_URL=$$(gcloud run services describe cra-server --region=${_REGION} --format="value(status.url)")
        gcloud run deploy cra-dashboard \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${_TAG} \
          --region=${_REGION} \
          --allow-unauthenticated \
          --set-env-vars="API_URL=$$SERVER_URL"

  # --- WORKER BUILD & DEPLOY ---
  # 4. Build Worker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Worker'
    args: ['build', '--build-arg', 'TARGET=worker', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}', '.']
  
  # 5. Push Worker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Worker'
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}']

  # 9. Deploy Worker Service (Push Webhook)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Worker'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cra-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO,GCS_BUCKET_NAME=cra-data-${PROJECT_ID},ROLE=worker'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      # Must be unauthenticated for basic HTTP Pub/Sub push in simple deployment
      - '--allow-unauthenticated'
      # Allow scaling to 0, no CPU allocation when idle required anymore!
      - '--min-instances'
      - '0'

substitutions:
  _REGION: us-central1
  _REPO_NAME: multi-agent-cra
  _TAG: latest

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/frontend:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'