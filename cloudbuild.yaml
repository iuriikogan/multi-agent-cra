steps:
  # --- SERVER BUILD & PUSH ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Server'
    waitFor: ['-']
    args: ['build', '--build-arg', 'TARGET=server', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Server'
    waitFor: ['Build Server']
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}']

  # --- WORKER BUILD & PUSH ---
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Worker'
    waitFor: ['-']
    args: ['build', '--build-arg', 'TARGET=worker', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}', '.']
  
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Worker'
    waitFor: ['Build Worker']
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}']

  # --- DEPLOYMENT ---
  # Deploy Server Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Server'
    waitFor: ['Push Server']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cra-server'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--ingress'
      - 'all'
      - '--service-account'
      - 'cra-server-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--vpc-connector'
      - 'cra-connector'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},ROLE=server,DATABASE_TYPE=CLOUD_SQL'
      - '--set-env-vars'
      - 'DATABASE_URL=cra_user:change_me_in_production@tcp(${_DB_IP}:3306)/cra_db?parseTime=true'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--no-allow-unauthenticated'

  # Deploy Worker Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Worker'
    waitFor: ['Push Worker']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cra-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--ingress'
      - 'internal'
      - '--service-account'
      - 'cra-worker-sa@${PROJECT_ID}.iam.gserviceaccount.com'
      - '--vpc-connector'
      - 'cra-connector'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},ROLE=worker,DATABASE_TYPE=CLOUD_SQL'
      - '--set-env-vars'
      - 'DATABASE_URL=cra_user:change_me_in_production@tcp(${_DB_IP}:3306)/cra_db?parseTime=true'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--no-allow-unauthenticated'

substitutions:
  _REGION: europe-west1
  _REPO_NAME: multi-agent-cra
  _TAG: latest
  _DB_IP: 10.0.0.3 # Dynamically replaced by build.sh

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
