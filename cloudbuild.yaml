steps:
  # --- SERVER BUILD & DEPLOY ---
  # Build Server Image (runs in parallel with worker build)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Server'
    waitFor: ['-'] # Start immediately
    args: ['build', '--build-arg', 'TARGET=server', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}', '.']
  
  # Push Server Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Server'
    waitFor: ['Build Server']
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}']

  # Deploy Server Service
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Server'
    waitFor: ['Push Server']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cra-server'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO,GCS_BUCKET_NAME=cra-data-${PROJECT_ID},ROLE=server,MODEL_AGGREGATOR=${_MODEL_AGGREGATOR},MODEL_MODELER=${_MODEL_MODELER},MODEL_VALIDATOR=${_MODEL_VALIDATOR},MODEL_REVIEWER=${_MODEL_REVIEWER},MODEL_TAGGER=${_MODEL_TAGGER},MODEL_REPORTER=${_MODEL_REPORTER}'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--allow-unauthenticated'
      - '--min-instances'
      - '1'

  # --- WORKER BUILD & DEPLOY ---
  # Build Worker Image (runs in parallel with server build)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Worker'
    waitFor: ['-'] # Start immediately
    args: ['build', '--build-arg', 'TARGET=worker', '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}', '.']
  
  # Push Worker Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Worker'
    waitFor: ['Build Worker']
    args: ['push', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}']

  # Deploy Worker Service (Push Webhook)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Worker'
    waitFor: ['Push Worker']
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'cra-worker'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
      - '--region'
      - '${_REGION}'
      - '--set-env-vars'
      - 'PROJECT_ID=${PROJECT_ID},LOG_LEVEL=INFO,GCS_BUCKET_NAME=cra-data-${PROJECT_ID},ROLE=worker,MODEL_AGGREGATOR=${_MODEL_AGGREGATOR},MODEL_MODELER=${_MODEL_MODELER},MODEL_VALIDATOR=${_MODEL_VALIDATOR},MODEL_REVIEWER=${_MODEL_REVIEWER},MODEL_TAGGER=${_MODEL_TAGGER},MODEL_REPORTER=${_MODEL_REPORTER}'
      - '--set-env-vars'
      - 'PUBSUB_TOPIC_SCAN_REQUESTS=scan-requests,PUBSUB_SUB_SCAN_REQUESTS=scan-requests-sub'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest'
      # Require authentication for Pub/Sub push requests
      - '--no-allow-unauthenticated'
      # Allow scaling to 0, no CPU allocation when idle required anymore!
      - '--min-instances'
      - '0'

substitutions:
  _REGION: europe-west1
  _REPO_NAME: multi-agent-cra
  _TAG: latest
  _MODEL_AGGREGATOR: gemini-2.5-flash
  _MODEL_MODELER: gemini-2.5-pro
  _MODEL_VALIDATOR: gemini-2-pro
  _MODEL_REVIEWER: gemini-2.5-pro
  _MODEL_TAGGER: gemini-2.5-pro 
  _MODEL_REPORTER: gemini-2.5-pro

options:
  machineType: 'E2_HIGHCPU_8'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/server:${_TAG}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO_NAME}/worker:${_TAG}'
